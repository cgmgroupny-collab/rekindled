    <circle cx="22" cy="22" r="4" fill="#C4935A"/>
    <ellipse cx="22" cy="9" rx="3" ry="8" fill="#8B3A4A" transform="rotate(0, 22, 22)"/>
    <ellipse cx="22" cy="9" rx="3" ry="8" fill="#8B3A4A" transform="rotate(60, 22, 22)"/>
