<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60" fill="none">
  <!-- Vivienne - Horizontal Logo -->
  <!-- Decorative flame/asterisk mark -->
  <g transform="translate(0, 8)">
    <!-- Stylized 6-petal flower/flame mark -->
    <circle cx="22" cy="22" r="3.5" fill="#C4935A"/>
    <ellipse cx="22" cy="10" rx="2.8" ry="7" fill="#8B3A4A" transform="rotate(0, 22, 22)"/>
    <ellipse cx="22" cy="10" rx="2.8" ry="7" fill="#8B3A4A" transform="rotate(60, 22, 22)"/>
    <ellipse cx="22" cy="10" rx="2.8" ry="7" fill="#8B3A4A" transform="rotate(120, 22, 22)"/>
    <ellipse cx="22" cy="10" rx="2.8" ry="7" fill="#8B3A4A" transform="rotate(180, 22, 22)"/>
    <ellipse cx="22" cy="10" rx="2.8" ry="7" fill="#8B3A4A" transform="rotate(240, 22, 22)"/>
    <ellipse cx="22" cy="10" rx="2.8" ry="7" fill="#8B3A4A" transform="rotate(300, 22, 22)"/>
  </g>
  <!-- Wordmark -->
  <text x="56" y="42" font-family="'Cormorant Garamond', 'Times New Roman', Georgia, serif" font-size="38" font-weight="500" fill="#8B3A4A" letter-spacing="-0.5">Vivienne</text>
</svg>